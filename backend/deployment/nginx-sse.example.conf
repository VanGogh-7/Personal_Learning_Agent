# Optional validation-only Nginx location for the PLA SSE endpoint.
# Merge this location into an existing server block; this is not a full deployment.
location /api/agent/chat/stream {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    add_header X-Accel-Buffering no always;
}
