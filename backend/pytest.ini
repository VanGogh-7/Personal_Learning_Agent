[pytest]
pythonpath = .
testpaths = tests
addopts = -m "not real_provider and not network and not soak and not manual_tauri"
markers =
    real_provider: opt-in tests that consume real Provider quota
    network: opt-in tests that require a reachable network service
    soak: opt-in repeated reliability tests
    manual_tauri: manual Tauri WebView validation documentation only
