[pytest]
pythonpath = .
testpaths = tests
addopts = -m "not real_provider and not real_mcp and not network and not soak and not manual_tauri and not external_ocr and not visual_gpu"
markers =
    real_provider: opt-in tests that consume real Provider quota
    real_mcp: opt-in tests that start configured external MCP servers or APIs
    network: opt-in tests that require a reachable network service
    soak: opt-in repeated reliability tests
    manual_tauri: manual Tauri WebView validation documentation only
    external_ocr: opt-in tests that invoke installed OCR system tools
    visual_gpu: opt-in tests that require a configured visual document model and GPU
